<!DOCTYPE html>
<html lang="bn" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Ism-e-Azam - Professor Foysal</title>
    <style>
        :root { 
            --peace-green: #2ecc71; 
            --deep-peace: #0a192f;  
            --text-soft: #e0e6ed;
            --accent-teal: #64ffda;
        }
        body { 
            background: var(--deep-peace); color: var(--text-soft); font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; padding: 15px; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation; /* জুম প্রিভেন্ট করবে এবং দ্রুত ট্যাপ হবে */
            transition: background 0.04s ease-out;
        }
        body.flash-active { background: #ffffff !important; }

        .container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; position: relative; z-index: 10; }
        
        .instructions {
            background: rgba(100, 255, 218, 0.15); border: 1.5px solid var(--accent-teal);
            padding: 12px; border-radius: 12px; font-size: 0.85rem; width: 100%; text-align: left; line-height: 1.4;
        }

        .sacred-letters { font-size: 1.5rem; color: var(--accent-teal); font-weight: bold; margin: 8px 0; text-shadow: 0 0 15px rgba(100, 255, 218, 0.6); }

        .main-button {
            background: var(--peace-green); color: #0a192f; width: 250px; height: 250px;
            border-radius: 50%; border: 12px solid rgba(255, 255, 255, 0.25);
            font-size: 80px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s active; -webkit-tap-highlight-color: transparent; outline: none;
        }
        .main-button:active { transform: scale(0.92); }

        .marksheet-title { font-size: 1rem; color: var(--accent-teal); margin-top: 15px; font-weight: 600; }
        .marksheet-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin: 10px 0; width: 100%; }
        .day-box { 
            aspect-ratio: 1/1; border: 1px solid rgba(100, 255, 218, 0.2); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; color: #4b6584; cursor: pointer; background: rgba(255,255,255,0.03);
        }
        .day-box.done { background: var(--peace-green); color: #0a192f; font-weight: bold; border: none; box-shadow: 0 0 12px var(--peace-green); }

        .reset-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 4px 12px; border-radius: 5px; font-size: 11px; margin-top: 5px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="instructions">
            <b>আমলের নিয়ম:</b> <br>
            ১. ৩ বার দরুদ শরীফ। <br>
            ২. ১০৩৬ বার (৫১৮ x ২) <b>"আল-মুমীত"</b>। <br>
            ৩. ৩ বার দরুদ ও দোয়া করে শেষ করুন।
        </div>

        <div class="sacred-letters">কাফ-হা-ইয়া-আইন-সোয়াদ</div>

        <button class="main-button" id="count-btn" ontouchstart="handleTap(event)" onmousedown="handleTap(event)">0</button>

        <div style="text-align:center; width: 100%;">
            <div class="marksheet-title">৪০ দিনের মার্কশিট (ম্যানুয়াল)</div>
            <div class="marksheet-grid" id="marksheet-grid"></div>
            <button class="reset-btn" onclick="resetCounter()">গণনা রিসেট করুন</button>
        </div>

        <div style="font-size: 10px; color: #4b6584;">Professor Foysal | Spiritual Engineering</div>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('current_count')) || 0;
        const target = 1036;
        const btn = document.getElementById('count-btn');
        const body = document.body;

        btn.innerText = count;

        function triggerHaptic() {
            // আইফোনে navigator.vibrate কাজ না করলে এটি একটি ছোট সাউন্ডলেস পালস জেনারেট করার চেষ্টা করবে
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function handleTap(e) {
            e.preventDefault();
            if (count < target) {
                // Full Screen Flash
                body.classList.add('flash-active');
                setTimeout(() => body.classList.remove('flash-active'), 40);

                triggerHaptic();

                count++;
                btn.innerText = count;
                localStorage.setItem('current_count', count);

                if (count === target) {
                    // আইফোনের জন্য হ্যাপটিক অ্যালার্ট
                    setTimeout(() => { alert("মাশাআল্লাহ! ১০৩৬ বার পূর্ণ হয়েছে।"); }, 100);
                }
            }
        }

        function loadMarksheet() {
            const grid = document.getElementById('marksheet-grid');
            grid.innerHTML = '';
            let marks = JSON.parse(localStorage.getItem('manual_marks') || '{}');
            
            for(let i=1; i<=40; i++) {
                const box = document.createElement('div');
                box.className = marks[i] ? 'day-box done' : 'day-box';
                box.innerText = i;
                box.onclick = () => {
                    marks[i] = !marks[i];
                    localStorage.setItem('manual_marks', JSON.stringify(marks));
                    loadMarksheet();
                };
                grid.appendChild(box);
            }
        }

        function resetCounter() {
            if(confirm("আজকের গণনা কি ০ করতে চান?")) {
                count = 0;
                btn.innerText = 0;
                localStorage.setItem('current_count', 0);
            }
        }

        loadMarksheet();
    </script>
</body>
</html>
