<!DOCTYPE html>
<html lang="bn" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Ism-e-Azam - Professor Foysal</title>
    <style>
        :root { 
            --peace-green: #2ecc71; 
            --deep-peace: #0a192f;  
            --text-soft: #e0e6ed;
            --accent-teal: #64ffda;
        }
        body { 
            background: var(--deep-peace); color: var(--text-soft); font-family: -apple-system, sans-serif; 
            height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
            transition: background 0.05s ease-out;
        }
        body.flash-active { background: #ffffff !important; }

        /* Full Screen Interactive Area */
        .tap-zone {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid rgba(100, 255, 218, 0.1); margin: 10px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.02); position: relative;
        }

        .instructions {
            position: absolute; top: 20px; padding: 15px; font-size: 0.85rem;
            color: var(--text-soft); text-align: left; width: 85%;
            background: rgba(100, 255, 218, 0.05); border-radius: 10px;
        }

        .counter-display { font-size: 120px; font-weight: bold; color: var(--accent-teal); z-index: 5; text-shadow: 0 0 20px rgba(100, 255, 218, 0.4); }
        .target-info { font-size: 14px; color: var(--peace-green); opacity: 0.8; margin-top: -10px; }

        /* Floating Marksheet Button */
        .marksheet-trigger {
            position: fixed; bottom: 30px; right: 20px; background: var(--accent-teal);
            color: #000; border: none; padding: 12px 20px; border-radius: 50px;
            font-weight: bold; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100;
        }

        /* Marksheet Overlay */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(10, 25, 47, 0.95);
            z-index: 200; padding: 20px; flex-direction: column; align-items: center; justify-content: center;
        }
        .marksheet-container {
            background: #112240; border: 2px solid var(--accent-teal); padding: 20px;
            border-radius: 20px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .marksheet-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 15px; }
        .day-box {
            aspect-ratio: 1/1; border: 1px solid rgba(100, 255, 218, 0.3); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: #8892b0;
        }
        .day-box.done { background: var(--peace-green); color: #000; font-weight: bold; border: none; }

        .close-btn { background: var(--accent-teal); color: #000; border: none; padding: 10px 30px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        .reset-mini { color: #ff4d4d; font-size: 12px; margin-top: 20px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="tap-zone" id="main-tap" ontouchstart="handleTap(event)" onmousedown="handleTap(event)">
        <div class="instructions">
            <b>কাফ-হা-ইয়া-আইন-সোয়াদ</b><br>
            ১. ৩ বার দরুদ শরীফ।<br>
            ২. ১০৩৬ বার "আল-মুমীত"।<br>
            ৩. ৩ বার দরুদ ও দোয়া।
        </div>
        
        <div class="counter-display" id="display">0</div>
        <div class="target-info">লক্ষ্য: ১০৩৬</div>
        <div style="font-size: 10px; color: #4b6584; margin-top: 40px;">Professor Foysal | স্ক্রিনের যেকোনো স্থানে ট্যাপ করুন</div>
    </div>

    <button class="marksheet-trigger" onclick="toggleMarksheet()">৪০ দিনের প্রগ্রেস</button>

    <div id="marksheet-overlay" class="overlay">
        <div class="marksheet-container">
            <h3 style="color:var(--accent-teal); margin-top:0;">৪০ দিনের প্রগ্রেস চার্ট</h3>
            <p style="font-size: 12px; color: #8892b0;">বক্স ট্যাপ করে আপনার সফল দিনগুলো মার্ক করুন</p>
            <div class="marksheet-grid" id="grid"></div>
            <center>
                <button class="close-btn" onclick="toggleMarksheet()">বন্ধ করুন</button>
                <div class="reset-mini" onclick="resetCounter()">গণনা ০ করুন</div>
            </center>
        </div>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('current_count')) || 0;
        const target = 1036;
        const display = document.getElementById('display');
        const body = document.body;
        let audioCtx;

        display.innerText = count;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playHapticBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); // Very short pulse
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function handleTap(e) {
            e.preventDefault();
            initAudio();

            if (count < target) {
                // Visual Flash
                body.classList.add('flash-active');
                setTimeout(() => body.classList.remove('flash-active'), 40);

                // Beep as Haptic
                playHapticBeep();
                
                // Native Haptic if available
                if (navigator.vibrate) navigator.vibrate(40);

                count++;
                display.innerText = count;
                localStorage.setItem('current_count', count);

                if (count === target) {
                    alert("মাশাআল্লাহ! আমল সম্পন্ন হয়েছে।");
                }
            }
        }

        function toggleMarksheet() {
            const overlay = document.getElementById('marksheet-overlay');
            const isVisible = overlay.style.display === 'flex';
            overlay.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) loadGrid();
        }

        function loadGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let marks = JSON.parse(localStorage.getItem('manual_marks') || '{}');
            for(let i=1; i<=40; i++) {
                const box = document.createElement('div');
                box.className = marks[i] ? 'day-box done' : 'day-box';
                box.innerText = i;
                box.onclick = (e) => {
                    e.stopPropagation();
                    marks[i] = !marks[i];
                    localStorage.setItem('manual_marks', JSON.stringify(marks));
                    loadGrid();
                };
                grid.appendChild(box);
            }
        }

        function resetCounter() {
            if(confirm("গণনা ০ করতে চান?")) {
                count = 0;
                display.innerText = 0;
                localStorage.setItem('current_count', 0);
                toggleMarksheet();
            }
        }

        // Initialize grid on load
        loadGrid();
    </script>
</body>
</html>
