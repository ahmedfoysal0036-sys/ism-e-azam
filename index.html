<!DOCTYPE html>
<html lang="bn" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Ism-e-Azam - Professor Foysal</title>
    <style>
        :root { 
            --peace-green: #2ecc71; 
            --deep-peace: #0a192f;  
            --accent-teal: #64ffda;
        }
        body { 
            background: var(--deep-peace); color: #e0e6ed; font-family: -apple-system, sans-serif; 
            height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
            transition: background 0.05s ease-out;
        }
        body.flash-active { background: #ffffff !important; }

        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }

        .instructions {
            background: rgba(100, 255, 218, 0.1); border: 1.5px solid var(--accent-teal);
            padding: 15px; border-radius: 12px; font-size: 0.9rem; width: 100%; text-align: left; line-height: 1.5;
            box-sizing: border-box;
        }

        #count-btn {
            flex: 1; margin: 20px 0; background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(100, 255, 218, 0.2); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        .counter-display { font-size: 100px; font-weight: bold; color: var(--accent-teal); }
        .target-label { font-size: 14px; color: var(--peace-green); margin-top: -10px; opacity: 0.8; }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { 
            background: var(--accent-teal); color: #000; border: none; padding: 12px 20px; 
            border-radius: 10px; font-weight: bold; font-size: 14px;
        }

        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(10, 25, 47, 0.98);
            z-index: 100; padding: 25px; flex-direction: column; align-items: center; justify-content: center;
        }
        .marksheet-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin: 20px 0; width: 100%; }
        .day-box { 
            aspect-ratio: 1/1; border: 1px solid rgba(100, 255, 218, 0.3); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }
        .day-box.done { background: var(--peace-green); color: #000; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="instructions">
            <b>আমলের নিয়ম:</b> <br>
            ১. ৩ বার দরুদ শরীফ পড়ুন। <br>
            ২. ১০৩৬ বার (৫১৮ x ২) <b>"আল-মুমীত"</b> পাঠ করুন। <br>
            ৩. ৩ বার দরুদ ও দোয়া করে আমল শেষ করুন। <br>
            <center><b style="color:var(--accent-teal); font-size:1.1rem; display:block; margin-top:5px;">কাফ-হা-ইয়া-আইন-সোয়াদ</b></center>
        </div>

        <div id="count-btn">
            <div class="counter-display" id="display">0</div>
            <div class="target-label">টার্গেট: ১০৩৬</div>
            <div style="font-size: 10px; color: #4b6584; margin-top: 30px;">এখানে ট্যাপ করুন</div>
        </div>

        <div class="bottom-bar">
            <button class="nav-btn" onclick="toggleMarksheet()">৪০ দিন চার্ট</button>
            <div style="color: #ff4d4d; font-size: 12px; text-decoration: underline;" onclick="resetCounter()">রিসেট</div>
        </div>
        <center><div style="font-size: 10px; color: #4b6584;">Professor Foysal | Spiritual Engineering</div></center>
    </div>

    <div id="marksheet-overlay" class="overlay">
        <h3 style="color:var(--accent-teal)">৪০ দিনের প্রগ্রেস</h3>
        <div class="marksheet-grid" id="grid"></div>
        <button class="nav-btn" onclick="toggleMarksheet()">বন্ধ করুন</button>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('current_count')) || 0;
        const target = 1036;
        const display = document.getElementById('display');
        const body = document.body;
        let audioCtx;

        display.innerText = count;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        document.getElementById('count-btn').addEventListener('touchstart', function(e) {
            e.preventDefault();
            initAudio();
            if (count < target) {
                body.classList.add('flash-active');
                setTimeout(() => body.classList.remove('flash-active'), 50);

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);

                count++;
                display.innerText = count;
                localStorage.setItem('current_count', count);
                
                if (count === target) {
                    setTimeout(() => { alert("মাশাআল্লাহ! ১০৩৬ বার পূর্ণ হয়েছে।"); }, 100);
                }
            }
        }, {passive: false});

        function toggleMarksheet() {
            const overlay = document.getElementById('marksheet-overlay');
            const isVisible = overlay.style.display === 'flex';
            overlay.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) loadGrid();
        }

        function loadGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let marks = JSON.parse(localStorage.getItem('manual_marks') || '{}');
            for(let i=1; i<=40; i++) {
                const box = document.createElement('div');
                box.className = marks[i] ? 'day-box done' : 'day-box';
                box.innerText = i;
                box.onclick = () => {
                    marks[i] = !marks[i];
                    localStorage.setItem('manual_marks', JSON.stringify(marks));
                    loadGrid();
                };
                grid.appendChild(box);
            }
        }

        function resetCounter() {
            if(confirm("গণনা ০ করতে চান?")) {
                count = 0;
                display.innerText = 0;
                localStorage.setItem('current_count', 0);
            }
        }
        loadGrid();
    </script>
</body>
</html>
