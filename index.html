<!DOCTYPE html>
<html lang="bn" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Ism-e-Azam - Professor Foysal</title>
    <style>
        :root { 
            --peace-green: #2ecc71; 
            --deep-peace: #0a192f;  
            --text-soft: #e0e6ed;
            --accent-teal: #64ffda;
        }
        body { 
            background: var(--deep-peace); color: var(--text-soft); font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; padding: 10px; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
        }
        .container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 92%; }
        
        .sacred-letters {
            font-size: 1.3rem; color: var(--accent-teal); letter-spacing: 1px;
            margin: 10px 0; font-weight: bold; text-shadow: 0 0 15px rgba(100, 255, 218, 0.5);
        }

        .counter-box { font-size: 110px; font-weight: bold; color: var(--accent-teal); margin: 5px 0; }

        /* বাটন ডিজাইন ও ফ্ল্যাশ ইফেক্ট */
        .main-button {
            background: var(--peace-green); color: #0a192f; width: 210px; height: 210px;
            border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.1);
            font-size: 30px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: background 0.05s ease-out; /* দ্রুত ফ্ল্যাশ */
            -webkit-tap-highlight-color: transparent; outline: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* বাটনে চাপ দিলে সাদা ফ্ল্যাশ হবে */
        .main-button:active { 
            background: #ffffff !important; 
            transform: scale(0.96);
            box-shadow: 0 0 30px #ffffff;
        }

        .nav-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .nav-btn { background: transparent; border: 1px solid var(--accent-teal); color: var(--accent-teal); padding: 8px 16px; border-radius: 8px; font-size: 12px; }
        
        #final-instruction {
            display: none; background: #112240; padding: 25px; border: 3px solid var(--peace-green);
            border-radius: 20px; width: 85%; position: absolute; top: 20%; z-index: 20; text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body class="notranslate">

    <div class="container">
        <div class="sacred-letters">( কাফ - হা - ইয়া - আইন - সোয়াদ )</div>

        <div id="advice-box" style="background: rgba(100, 255, 218, 0.05); border: 1px solid rgba(100, 255, 218, 0.2); padding: 12px; border-radius: 12px; font-size: 0.85rem; width: 85%; text-align: center;">
            ১. শুরুতে ৩ বার দরুদ শরীফ। <br>
            ২. ৫১৮ বার <b>"আল-মুমীত"</b> পাঠ। <br>
            ৩. শেষে ৩ বার দরুদ ও দোয়া।
        </div>

        <div style="font-size: 1.2rem; color: var(--peace-green); font-family: monospace; margin-top:10px;" id="timer">00:00</div>
        <div class="counter-box" id="count-display">0</div>

        <button class="main-button" id="count-btn" ontouchstart="handleTap(event)" onmousedown="handleTap(event)">গণনা</button>

        <div style="color: var(--peace-green); font-size: 12px; opacity: 0.7; margin-bottom: 10px;">টার্গেট: ৫১৮</div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="resetAll()">রিসেট</button>
            <button class="nav-btn" onclick="location.reload()">রিফ্রেশ</button>
        </div>

        <div id="final-instruction">
            ✨ আলহামদুলিল্লাহ! <br> সম্পন্ন হয়েছে! <br><br>
            <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; font-size: 15px;">
                এখন ৩ বার দরুদ শরীফ পাঠ করে দোয়া করুন।
            </div>
            <br>
            <button class="nav-btn" onclick="closeFinal()" style="width: 100%; background: var(--peace-green); color: #000; border: none; font-weight:bold; font-size:18px; padding:12px;">সম্পন্ন</button>
        </div>

        <div style="font-size: 10px; color: #4b6584; margin-bottom: 5px;">Professor Foysal | Spiritual Engineering</div>
    </div>

    <script>
        let count = 0;
        let timerRunning = false;
        let seconds = 0;
        let timerInterval;
        let alarmInterval;
        let audioCtx;
        const target = 518;
        
        const countDisplay = document.getElementById('count-display');
        const timerDisplay = document.getElementById('timer');
        const finalBox = document.getElementById('final-instruction');

        // iPhone-এর জন্য অডিও সিস্টেম চালু করা
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function handleTap(e) {
            e.preventDefault(); 
            initAudio();
            
            if (!timerRunning && count < target) {
                timerRunning = true;
                timerInterval = setInterval(() => {
                    seconds++;
                    let mins = Math.floor(seconds / 60);
                    let secs = seconds % 60;
                    timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }, 1000);
            }

            if (count < target) {
                count++;
                countDisplay.innerText = count;
                playTick(); // ট্যাপ করলে শব্দ হবে
                if (count === target) completeAmal();
            }
        }

        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime); // হালকা ক্লিক সাউন্ড
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function completeAmal() {
            clearInterval(timerInterval);
            timerRunning = false;
            
            // আমল শেষ হলে একটানা বিপ শব্দ বাজবে
            alarmInterval = setInterval(() => {
                playAlarm(880, 0.3); 
            }, 600);

            finalBox.style.display = 'block';
        }

        function playAlarm(freq, duration) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resetAll() {
            if(confirm("রিসেট করতে চান?")) {
                location.reload();
            }
        }

        function closeFinal() { 
            if(alarmInterval) clearInterval(alarmInterval);
            finalBox.style.display = 'none'; 
            count = 0; seconds = 0;
            countDisplay.innerText = "0";
            timerDisplay.innerText = "00:00";
        }
    </script>
</body>
</html>
